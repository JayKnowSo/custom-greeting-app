# Security Pipeline
# Runs on every push and pull request to main
# Three jobs: test suite, SAST scan, then CVE scan
# Pipeline fails if CRITICAL CVEs found or Semgrep finds issues
name: Security Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    name: Run Security Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml
      - name: Run test suite
        env:
          DATABASE_URL: sqlite:///./test_local.db
          SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest tests/ --tb=short -q

  sast:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: p/python p/secrets p/owasp-top-ten

  trivy-scan:
    name: Container CVE Scan
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build Docker image
        run: |
          docker build -t security-scan-image:latest .
      - name: Run Trivy CVE scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: security-scan-image:latest
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
      - name: Upload scan results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 30

# Security Pipeline
name: Security Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    name: Run Security Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml
      - name: Run test suite
        env:
          DATABASE_URL: sqlite:///./test_local.db
          SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest tests/ --tb=short -q

  sast:
    name: SAST Scan (Semgrep + Gitleaks)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: p/python p/secrets p/owasp-top-ten
      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: OPA policy gate
        run: |
          curl -L -o /usr/local/bin/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          python3 opa/check_dockerfile.py

  sbom:
    name: SBOM Generation + Vulnerability Scan
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM
        run: syft . --exclude './chosen-crew' -o cyclonedx-json > sbom.json
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan SBOM for vulnerabilities
        run: grype sbom:./sbom.json --fail-on critical
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 30

  dast:
    name: DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: sbom
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Start application
        run: |
          docker compose up -d
          sleep 10
      - name: Run ZAP baseline scan
        run: |
          docker run --rm --network host             -v /tmp:/zap/wrk             ghcr.io/zaproxy/zaproxy:stable zap-baseline.py             -t http://localhost:8000             -r zap-report.html             -I
      - name: Upload ZAP report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: zap-report
          path: /tmp/zap-report.html
          retention-days: 30

  trivy-scan:
    name: Container CVE Scan + Image Signing
    runs-on: ubuntu-latest
    needs: sbom
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build Docker image
        run: docker build -t security-scan-image:latest .
      - name: Install Cosign
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
      - name: Sign Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ""
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes security-scan-image:latest
      - name: Run Trivy CVE scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: security-scan-image:latest
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
      - name: Upload scan results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 30

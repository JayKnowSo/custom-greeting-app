# Security Pipeline
# Runs on every push and pull request to main
# Two jobs: test suite first, then CVE scan
# Pipeline fails if CRITICAL CVEs found in the image

name: Security Pipeline

on:
  push:
    branches: [ main ]      # triggers on every push to main
  pull_request:
    branches: [ main ]      # triggers on every PR before merge

jobs:
  test:
    name: Run Security Tests
    runs-on: ubuntu-latest  # GitHub spins up a fresh Ubuntu VM for every run

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # pulls your repo code into the VM

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'    # must match your Dockerfile Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt   # installs your exact pinned versions

      - name: Run test suite
        env:
          DATABASE_URL: sqlite:///./test_local.db   # same override as pytest.ini
          SECRET_KEY: test-secret-key-for-ci        # never use real secrets in CI env vars
        run: |
          pytest tests/ --tb=short -q   # -q = quiet mode, shows summary only

  trivy-scan:
    name: Container CVE Scan
    runs-on: ubuntu-latest
    needs: test   # only runs if test job passes — no point scanning broken code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t security-scan-image:latest .   # builds from your Dockerfile

      - name: Run Trivy CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: security-scan-image:latest
          format: table
          exit-code: '1'        # exit code 1 = fail the pipeline if CVEs found
          severity: CRITICAL    # only fail on CRITICAL — HIGH/MEDIUM are reported only
          ignore-unfixed: true  # skip CVEs with no fix available (like ecdsa)

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()            # upload results even if the scan fails
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 30    # GitHub keeps the artifact for 30 days
